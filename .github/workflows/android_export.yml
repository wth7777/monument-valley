name: Android Export

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Download Godot
      run: |
        wget -q https://github.com/godotengine/godot/releases/download/4.4-stable/Godot_v4.4-stable_linux.x86_64.zip
        unzip -q Godot_v4.4-stable_linux.x86_64.zip
        mv Godot_v4.4-stable_linux.x86_64 godot4
        chmod +x godot4
    
    - name: Install Android Export Templates
      run: |
        mkdir -p ~/.local/share/godot/templates/4.4.stable
        wget -q https://github.com/godotengine/godot/releases/download/4.4-stable/Godot_v4.4-stable_export_templates.tpz
        unzip -q Godot_v4.4-stable_export_templates.tpz -d ~/.local/share/godot/templates/4.4.stable/
    
    - name: Create export preset
      run: |
        mkdir -p ~/.local/share/godot/templates/4.4.stable
        echo '[config]' > export_presets.cfg
        echo 'name="Android"' >> export_presets.cfg
        echo 'platform="Android"' >> export_presets.cfg
        echo 'custom_features=""' >> export_presets.cfg
        echo 'release="true"' >> export_presets.cfg
        echo 'export_path="res://builds/android/MonumentValley.apk"' >> export_presets.cfg
        echo '' >> export_presets.cfg
        echo '[android]' >> export_presets.cfg
        echo 'keystore="debug"' >> export_presets.cfg
        echo 'application="com.tom.monumentvalley"' >> export_presets.cfg
        echo 'version_code="1"' >> export_presets.cfg
        echo 'version_string="1.0"' >> export_presets.cfg
        echo 'main_orientation="portrait"' >> export_presets.cfg
        echo 'upi_support="false"' >> export_presets.cfg
        echo 'architectures="armeabi-v7a"' >> export_presets.cfg
        echo 'use_size_apk="true"' >> export_presets.cfg
        mv export_presets.cfg .
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
    
    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
    
    - name: Export Android APK
      run: |
        mkdir -p builds/android
        ./godot4 --headless --export-release "Android" builds/android/MonumentValley.apk
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MonumentValley.apk
        path: builds/android/MonumentValley.apk
