name: Android Export

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Download Godot
      run: |
        wget -q https://github.com/godotengine/godot/releases/download/4.4-stable/Godot_v4.4-stable_linux.x86_64.zip
        unzip -q Godot_v4.4-stable_linux.x86_64.zip
        mv Godot_v4.4-stable_linux.x86_64 godot4
        chmod +x godot4
    
    - name: Install Android Export Templates
      run: |
        mkdir -p ~/.local/share/godot/templates/4.4.stable
        wget -q https://github.com/godotengine/godot/releases/download/4.4-stable/Godot_v4.4-stable_export_templates.tpz
        unzip -q Godot_v4.4-stable_export_templates.tpz -d ~/.local/share/godot/templates/4.4.stable/
    
    - name: Create export preset
      run: python3 -c "print('[config]\nname=\"Android\"\nplatform=\"Android\"\ncustom_features=\"\"\nrelease=\"true\"\nexport_path=\"res://builds/android/MonumentValley.apk\"\n\n[android]\nkeystore=\"debug\"\napplication=\"com.tom.monumentvalley\"\nversion_code=\"1\"\nversion_string=\"1.0\"\nmain_orientation=\"portrait\"\nupi_support=\"false\"\narchitectures=\"armeabi-v7a\"\nuse_size_apk=\"true\"')" > export_presets.cfg
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
    
    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
    
    - name: Export Android APK
      run: |
        mkdir -p builds/android
        ./godot4 --headless --export-release "Android" builds/android/MonumentValley.apk
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MonumentValley.apk
        path: builds/android/MonumentValley.apk
